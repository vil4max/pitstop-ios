name: PR checks

on:
  pull_request:
    branches: [main]

jobs:
  branch-name:
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          if [[ "$BRANCH" =~ ^legacy/ ]]; then
            echo "Legacy branch allowed: $BRANCH"
            exit 0
          fi
          if [[ "$BRANCH" =~ ^[A-Z]{2,}(-[A-Z]{2,})?-[0-9]{3}/[a-z0-9-]+$ ]]; then
            echo "Valid task branch: $BRANCH"
            exit 0
          fi
          echo "Invalid branch: $BRANCH"
          echo "Expected: TASK-ID/slug (e.g. DOM-001/domain-inventory)"
          exit 1
