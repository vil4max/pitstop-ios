name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build and test
        run: |
          xcodebuild \
            -project Pitstop.xcodeproj \
            -scheme Pitstop \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            -configuration Debug \
            test
